<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jquery Basics 01</title>
    <script src="../library/jquery-4.0.0.js"></script>
    <script src="./js/script.js"></script>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <div id="box1">
        <h1>Jquery Basics 01</h1>
        <p>This is a simple paragraph inside the box.</p>
    </div>

    <div id="box2">
        <h2>Another Box</h2>
        <p>This is another paragraph inside a different box.</p>
    </div>

    <ul id="list">
        <li class="list-item">Item 1</li>
        <li>Item 2</li>
        <li class="list-item">Item 3</li>
        <li>Item 4</li>
    </ul>

    <div id="box3">
        <h3>Box with ID 'box'</h3>
        <p>This box has an ID of 'box'.</p>
        <div id="reset">RESET color Hover over me and change to leave me</div>
        <button id="button3">Click Me to change background color and double click to change another color</button>
        <button id="button3a">right click to change background</button>
    </div>

</body>

</html>
